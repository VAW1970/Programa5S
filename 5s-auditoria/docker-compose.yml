version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: programa-5s
    ports:
      - "5000:5000"
    volumes:
      - db-data:/app/data
    environment:
      - DATABASE=/app/data/auditoria_5s.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  db-data:
    driver: local
